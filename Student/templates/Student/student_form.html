{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <h1 style="margin:0 0 16px;">Student Form</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" style="padding:8px 16px;background:#27ae60;color:#fff;border:none;border-radius:4px;">Save</button>
    <a href="{% url 'student_list' %}" style="margin-left:8px;color:#666;">Cancel</a>
  </form>
</div>
{% endblock %}
