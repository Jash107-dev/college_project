{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .login-container h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .login-container form {
            display: flex;
            flex-direction: column;
        }
        .login-container label {
            font-weight: bold;
            color: #34495e;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .login-container input {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 3px;
            font-size: 14px;
        }
        .login-container button {
            background-color: #3498db;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            font-weight: bold;
        }
        .login-container button:hover {
            background-color: #2980b9;
        }
        .error-message {
            color: #e74c3c;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        .success-message {
            color: #27ae60;
            background-color: #d4edda;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
    </style>
    <div class="login-container">
        <h1>College Project - Login</h1>
        
        {% if form.non_field_errors %}
            <div class="error-message">
                {{ form.non_field_errors.0 }}
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </div>
{% endblock %}
