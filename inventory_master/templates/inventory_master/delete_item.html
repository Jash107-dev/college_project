{% extends 'base.html' %}

{% block content %}

<h2>Delete Inventory Item</h2>

<p>
Are you sure you want to delete:
<strong>{{ item.item_name }}</strong> ?
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<br>

<a href="/inventory/">Cancel</a>

{% endblock %}
