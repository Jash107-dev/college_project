{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <h1 style="margin:0 0 16px;">Delete Inventory Item</h1>
  <p>Are you sure you want to delete <strong>{{ item.item_name }}</strong>?</p>
  <form method="POST">
    {% csrf_token %}
    <button type="submit" style="padding:8px 16px;background:#e74c3c;color:#fff;border:none;border-radius:4px;">Yes, Delete</button>
    <a href="/inventory/" style="margin-left:12px;color:#333;">Cancel</a>
  </form>
</div>
{% endblock %}
