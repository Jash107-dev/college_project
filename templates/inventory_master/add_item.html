{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <h1 style="margin:0 0 16px;">Add Inventory Item</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" style="padding:8px 16px;background:#2d6ce2;color:#fff;border:none;border-radius:4px;">Save</button>
  </form>
  <p style="margin-top:12px;"><a href="/inventory/">Back to Inventory List</a></p>
</div>
{% endblock %}
