{% extends 'base.html' %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
    <h2>Delete Project</h2>
    <p>Are you sure you want to delete "{{ project.title }}"?</p>
    <form method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" style="background-color:#dc3545;color:white;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;">Delete</button>
    </form>
    <a href="{% url 'project_list' %}" style="margin-left:16px;color:#007bff;text-decoration:none;">Cancel</a>
</div>
{% endblock %}
