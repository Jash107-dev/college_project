{% extends 'base.html' %}

{% block title %}{{ action }} Project{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 24px auto; padding: 16px; border:1px solid #ccc; border-radius:8px;">
  <h1 style="margin-bottom:16px;">{{ action }} Project</h1>

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:12px;"><label>Title<br>{{ form.title }}</label></div>
    <div style="margin-bottom:12px;"><label>Student Name<br>{{ form.student_name }}</label></div>
    <div style="margin-bottom:12px;"><label>Roll Number<br>{{ form.roll_number }}</label></div>
    <div style="margin-bottom:12px;"><label>Status<br>{{ form.status }}</label></div>
    <div style="margin-bottom:12px;"><label>Description<br>{{ form.description }}</label></div>
    <div style="margin-bottom:12px;"><label>GitHub Link<br>{{ form.github_link }}</label></div>
    <div style="margin-bottom:12px;"><label>Demo Link<br>{{ form.demo_link }}</label></div>
    <button type="submit" style="padding:8px 16px;">{{ action }} Project</button>
  </form>

  <p><a href="{% url 'project_list' %}">Back to Project List</a></p>
</div>
{% endblock %}
