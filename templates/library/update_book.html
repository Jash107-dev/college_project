{% extends 'base.html' %}

{% block content %}

<h2>Update Book</h2>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <input name="title" value="{{ book.title }}"><br>
    <input name="author" value="{{ book.author }}"><br>
    <input name="isbn" value="{{ book.isbn }}"><br>
    <input name="category" value="{{ book.category }}"><br>
    <input name="quantity" type="number" value="{{ book.quantity }}"><br>
    <button type="submit">Update</button>
</form>

{% endblock %}
