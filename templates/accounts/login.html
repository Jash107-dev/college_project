{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
    <h1 style="margin:0 0 16px;text-align:center;">College Project - Login</h1>

    {% if form.non_field_errors %}
        <div style="color:#e74c3c;background-color:#f8d7da;padding:10px;border-radius:4px;margin-bottom:16px;border:1px solid #f5c6cb;">
            {{ form.non_field_errors.0 }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:12px;">
            <label>Username<br>{{ form.username }}</label>
        </div>
        <div style="margin-bottom:12px;">
            <label>Password<br>{{ form.password }}</label>
        </div>
        <button type="submit" style="padding:8px 16px;background:#3498db;color:#fff;border:none;border-radius:4px;">Login</button>
    </form>
</div>
{% endblock %}
