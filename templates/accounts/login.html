{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width:400px;margin:40px auto;padding:24px;border:1px solid #ccc;border-radius:8px;">
    <h2 style="text-align:center;margin-bottom:20px;">College Project - Login</h2>

    {% if error %}
        <div style="color:#e74c3c;background:#f8d7da;padding:10px;border-radius:4px;margin-bottom:16px;border:1px solid #f5c6cb;">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:12px;">
            <label>Username</label><br>
            <input type="text" name="username" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        </div>
        <div style="margin-bottom:16px;">
            <label>Password</label><br>
            <input type="password" name="password" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        </div>
        <button type="submit" style="width:100%;padding:10px;background:#3498db;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer;">Login</button>
    </form>
</div>
{% endblock %}
