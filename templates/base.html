<!DOCTYPE html>
<html>
<head>
    <title>College Management System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 20px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>College Management System</h1>
</header>

<nav>
    <a href="/employee/">Employee</a>
    <a href="#">Student</a>
    <a href="#">Library</a>
    <a href="#">Inventory</a>
    <a href="#">Projects</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>© 2026 College Project Team</p>
</footer>

</body>
</html>
