{% extends 'base.html' %}

{% block content %}

<style>
    h2 {
        text-align: center;
        color: #2c3e50;
    }

    .add-btn {
        display: inline-block;
        margin-bottom: 15px;
        padding: 10px 15px;
        background-color: #27ae60;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .add-btn:hover {
        background-color: #219150;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        background-color: white;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background-color: #34495e;
        color: white;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    .btn {
        padding: 6px 10px;
        text-decoration: none;
        border-radius: 4px;
        color: white;
        font-size: 14px;
    }

    .edit-btn {
        background-color: #2980b9;
    }

    .edit-btn:hover {
        background-color: #1f6391;
    }

    .delete-btn {
        background-color: #e74c3c;
    }

    .delete-btn:hover {
        background-color: #c0392b;
    }

    .no-data {
        text-align: center;
        padding: 20px;
        font-size: 18px;
        color: gray;
    }
</style>



<a href="{% url 'student_create' %}" class="add-btn"> Add New Student</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_number }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
            <td>
                <a href="{% url 'student_update' student.pk %}" class="btn edit-btn"> Edit</a>
                <a href="{% url 'student_delete' student.pk %}" class="btn delete-btn"> Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="no-data">No students found </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
