{% extends 'base.html' %}

{% block content %}
<h2>Delete Student</h2>
<p>Are you sure you want to delete <strong>{{ student.name }}</strong>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'student_list' %}">Cancel</a>
</form>
{% endblock %}
