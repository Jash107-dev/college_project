{% extends 'base.html' %}

{% block content %}

<style>
    .form-container {
        width: 50%;
        margin: auto;
        background-color: #ffffff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #2c3e50;
    }

    form p {
        margin-bottom: 15px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .btn {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        color: white;
        text-decoration: none;
        cursor: pointer;
        font-size: 14px;
    }

    .save-btn {
        background-color: #27ae60;
    }

    .save-btn:hover {
        background-color: #219150;
    }

    .cancel-btn {
        background-color: #7f8c8d;
        margin-left: 10px;
    }

    .cancel-btn:hover {
        background-color: #636e72;
    }
</style>

<div class="form-container">

    <h2>🎓 Student Form</h2>

    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" class="btn save-btn"> Save</button>
        <a href="{% url 'student_list' %}" class="btn cancel-btn">Cancel</a>
    </form>

</div>

{% endblock %}
