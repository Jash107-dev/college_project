{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <h1 style="margin:0 0 16px;">Add Employee</h1>
  <form method="post">
    {% csrf_token %}
    <label>Name<br><input type="text" name="name" placeholder="Name" required style="width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Email<br><input type="email" name="email" placeholder="Email" required style="width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Department<br><input type="text" name="department" placeholder="Department" required style="width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Salary<br><input type="number" name="salary" placeholder="Salary" value="0" required style="width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <button type="submit" style="padding:8px 16px;margin-top:12px;background:#2d6ce2;color:#fff;border:none;border-radius:4px;">Save</button>
  </form>
  <p style="margin-top:12px;"><a href="/employee/">Back to Employee List</a></p>
</div>
{% endblock %}
