{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <h1 style="margin:0 0 16px;">Add Book</h1>
  {% if error %}
  <p style="color:red;">{{ error }}</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Title<br><input name="title" placeholder="Title" required style="width:100%;padding:8px; margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Author<br><input name="author" placeholder="Author" required style="width:100%;padding:8px; margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>ISBN<br><input name="isbn" placeholder="ISBN" required style="width:100%;padding:8px; margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Category<br><input name="category" placeholder="Category" required style="width:100%;padding:8px; margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <label>Quantity<br><input name="quantity" type="number" value="0" required style="width:100%;padding:8px; margin:6px 0;border:1px solid #ccc;border-radius:4px;"></label>
    <button type="submit" style="padding:8px 16px;background:#2d6ce2;color:#fff;border:none;border-radius:4px;margin-top:10px;">Add</button>
  </form>
  <p style="margin-top:12px;"><a href="/library/">Back to Book List</a></p>
</div>
{% endblock %}
