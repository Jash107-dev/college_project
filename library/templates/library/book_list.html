{% extends 'base.html' %}

{% block content %}
<div style="max-width:800px;margin:24px auto;padding:16px;border:1px solid #ccc;border-radius:8px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h1 style="margin:0;">Books</h1>
    <a href="/library/add/" style="padding:8px 12px;background:#2d6ce2;color:#fff;border-radius:6px;text-decoration:none;">Add Book</a>
  </div>
  {% if books %}
  <ul style="list-style:none;padding:0;">
    {% for book in books %}
    <li style="border:1px solid #ddd;border-radius:8px;padding:10px;margin:8px 0;">
      <strong>{{ book.title }}</strong> by {{ book.author }} ({{ book.quantity }})
      <div><a href="/library/update/{{ book.id }}">Edit</a> | <a href="/library/delete/{{ book.id }}">Delete</a></div>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p>No books available.</p>
  {% endif %}
</div>
{% endblock %}
