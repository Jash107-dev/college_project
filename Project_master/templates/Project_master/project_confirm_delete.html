{% extends 'base.html' %}

{% block title %}Delete Project{% endblock %}

{% block content %}
    <h1>Delete Project</h1>
    
    <p>Are you sure you want to delete "{{ project.title }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    
    <a href="{% url 'project_list' %}">Cancel</a>
{% endblock %}
